<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning DOM</title>
  </head>
  <body>
    <div>
      <h1 id="textdom">This is DOM</h1>
      <button onclick="updateDom()">update DOM</button>

      <div style="border: 1.5px solid black; margin: 10px; text-align: center">
        <button style="padding: 2px; margin: 10px" onclick="updateList()">
          add list
        </button>
        <br />
        <p
          style="border: 1.5px solid blue; padding: 2px; display: inline-block"
        >
          add using EVENTLISTENER double click
        </p>
        <ul>
          <li
            style="
              padding: 5px;
              font-weight: bold;
              border: 1.5px solid black;
              margin-bottom: 10px;
            "
          >
            list item 1
          </li>
          <li
            style="
              padding: 5px;
              font-weight: bold;
              border: 1.5px solid black;
              margin-bottom: 10px;
            "
          >
            list item 2
          </li>
          <li
            style="
              padding: 5px;
              font-weight: bold;
              border: 1.5px solid black;
              margin-bottom: 10px;
            "
          >
            list item 3
          </li>
        </ul>
      </div>
    </div>

    <script>
      function updateDom() {
        const update = document.getElementById("textdom");
        update.innerText = "DOM has been updated";
      }
      // EVENT HANDLER //
      function updateList() {
        const elementlist = document.createElement("li");
        // style
        elementlist.style.padding = "5px";
        elementlist.style.fontWeight = "bold";
        elementlist.style.border = "1px solid black";
        elementlist.style.marginBottom = "10px";
        const textlist = document.createTextNode("new list via event handler");
        elementlist.appendChild(textlist);
        const listplace = document.getElementsByTagName("ul")[0];
        listplace.appendChild(elementlist);
      }

      // EVENT LISTENER //
      const buttonText = document.getElementsByTagName("p")[0];
      buttonText.addEventListener("dblclick", function () {
        const elementlist = document.createElement("li");
        // style
        elementlist.style.padding = "5px";
        elementlist.style.fontWeight = "bold";
        elementlist.style.border = "1px solid black";
        elementlist.style.marginBottom = "10px";
        const textlist = document.createTextNode("new list via event listener");
        elementlist.appendChild(textlist);
        const listplace = document.getElementsByTagName("ul")[0];
        listplace.appendChild(elementlist);
      });
    </script>
  </body>
</html>
