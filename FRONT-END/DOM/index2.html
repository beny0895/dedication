<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOM Manipulation</title>
  <style>
    * { 
        border: 2px solid #dedede; 
        padding: 15px; 
        margin: 15px; 
    }
    html { 
      margin: 0;
      padding: 0;
    }
    body { 
      max-width: 600px;
      margin: 30px auto;
      font-family: sans-serif;
      color: #333;
    }
    .bg {
      background-color: lightblue;
    }
  </style>
</head>
<body>

  <h1 id="title">Hello World</h1>
  <div id="container">
      <section id="a">
          <p class="p1">paragraph 1</p>
          <a href="http://instagram.com/BenyGunadi">Instagram Beny Gunadi</a>
          <p class="p2">paragraph 2</p>
          <p class="p3">paragraph 3</p>
      </section>
      <section id="b">
          <p>paragraph 4</p>
          <ul>
              <li>item 1</li>
              <li>item 2</li>
              <li>item 3</li>
          </ul>
          <button onclick="lampbg()">Lamp</button>
      </section>
  </div>

<script>
// NO 1 // CREATING & CHECKING ID/CLASS ATTRIBUTES WITH SET & GET
// setAttribute
    const title = document.getElementsByTagName("h1")[0];
    title.setAttribute("name", "beny");

    const a = document.querySelector("section#a a");
    a.setAttribute("id", "link");
    // getAttribute to retrieve the value
    a.getAttribute("id");
  
// NO 2 // CLASS LIST
    const p2 = document.querySelector(".p2");
// classList.add
    // add class values without overwriting the old ones
    p2.classList.add("label");
    p2.classList.add("p3");

// classList.remove
    // removes the class value if there is one named "label"
    p2.classList.remove("label");

// classList.toggle
    // adds a value if it doesn’t exist, otherwise removes it
    p2.classList.toggle("p4");

    // create a lamp effect
    function lampbg () {
      document.body.classList.toggle("bg");
    };

// classList.item
    // to see the class inside the tag if it exists, otherwise returns null
    p2.classList.item(2);

// classList.contains
    // check if there is a "p4" class in the p2 tag, returns true or false
    p2.classList.contains("p4");

// classList.replace
    // replace the class inside the tag
    p2.classList.replace("p4", "p7");
    
</script>
</body>
</html>
