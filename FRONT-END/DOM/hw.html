<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>belajar dom</title>
</head>
<body>
    <div>
        <h1 class="dom">DOM LAMA</h1> <!--index ke 0-->
         <button onclick="UpdateDom()">Update Dom</button>
         <br>
         <button style="margin: 5px;" onclick="UpdateList()">Add List</button>
        <h1 class="dom" style="font-size: x-large; color: red;">list 1</h1> <!--index ke 1-->
         
    </div>
</body>

<script>
    // function expression
    function UpdateDom() {
        const ambilElement = document.getElementsByClassName("dom")[0]
        ambilElement.innerHTML = "DOM DI UPDATE"
    };
    // arrow function
    const UpdateList = () => {
        const tambahList = document.createElement("h1");
        tambahList.style.fontSize = "x-large";
        tambahList.style.color = "blue"
        const textList = document.createTextNode("list baru");
        tambahList.appendChild(textList);
        const ambilElement1 = document.getElementsByTagName("h1") [1];
        ambilElement1.appendChild(tambahList)
    }

</script>

</html>
