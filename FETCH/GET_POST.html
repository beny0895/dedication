<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Fetch & Post API</title>
  </head>
  <body>
    <h1>Daftar Users</h1>
    <ul id="users"></ul>
    <br />

    <form id="formUsers">
      <input type="text" id="firstname" placeholder="first name" /><br />
      <input type="text" id="lastname" placeholder="last name" /><br />
      <input type="email" id="email" placeholder="email" /><br />
      <input type="password" id="password" placeholder="password" /><br />
      <button type="submit">Submit</button>
    </form>

    <script>
      const api = "https://694ba34a26e870772068a7b1.mockapi.io/api/v1/users";
      // GET_API_METHOD
      async function getApi() {
        try {
          const response = await fetch(api);
          const data = await response.json();
          const usersEl = document.getElementsByTagName("ul")[0];
          data.forEach((user) => {
            const li = document.createElement("li");
            li.textContent = `${user.firstname} - ${user.lastname} - ${user.email} - ${user.password}`;
            usersEl.appendChild(li);
          });
        } catch (error) {
          console.error("Error fetch data:", error);
        }
      }
      getApi();
      // POST_API_METHOD
      const form = document.getElementById("formUsers");
      form.addEventListener("submit", async function (event) {
        event.preventDefault();

        const firstname = document.getElementById("firstname").value;
        const lastname = document.getElementById("lastname").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
          const response = await fetch("https://694ba34a26e870772068a7b1.mockapi.io/api/v1/users", {
            method: "post",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              firstname,
              lastname,
              email,
              password,
            }),
          });

          const data = await response.json();
          console.log("Data berhasil ditambahkan:", data);
        } catch (error) {}
      });
    </script>
  </body>
</html>
